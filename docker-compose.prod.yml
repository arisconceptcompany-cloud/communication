services:
  intranet:
    build: .
    ports:
      - "3031:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "file:/app/data/intranet.db"
      NODE_ENV: production
      SKIP_SEED: "false"
    volumes:
      - intranet_data:/app/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  intranet_data:
